<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>AI Video Game Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to the AI Video Game Generator 🕹️</h1>
      </header>

      <main>
        <div class="form-container">
          <form id="game-generator-form">
            <input
              type="text"
              placeholder="Enter a video game genre"
              autofocus
              required
              autocomplete="off"
              class="instructions"
              id="user-instructions"
            />
            <input type="submit" class="submit-button" />
          </form>
          <div class="hint">i.e: cozy, action-adventure, horror, etc...</div>
        </div>

        <div class="game hidden" id="game"></div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/cocopuff79" target="_blank">
          Nicole Williams</a
        >
        and is
        <a
          href="https://github.com/cocopuff79/ai_generator_project"
          target="_blank"
          >open-sourced on GitHub</a
        >
        and is
        <a
          href="https://ai-add-on-generator-project.netlify.app/"
          target="_blank"
        >
          hosted on Netlify.</a
        >
      </footer>
    </div>

    <script src="src/script.js"></script>
  </body>
</html>
