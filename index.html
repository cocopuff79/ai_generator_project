<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>AI Generator</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Welcome to the AI Add-on Project</h1>
      </header>

      <main>
        <form>
          <input
            type="text"
            placeholder="Enter the topic of the French poem"
            autofocus
            required
            autocomplete="off"
            class="instructions"
          />
          <input type="submit" class="submit-button" />
        </form>
        <div class="poem">
          Pour dessiner des fleurs.
          <br />
          L’alphabet des écoliers.
          <br />
          Tout un tas de confettis.
          <br />
          Le chahut sur le chemin ? C’est la rentrée qui revient !
        </div>
      </main>

      <footer>
        This AI project was coded by
        <a href="https://github.com/cocopuff79" target="_blank">
          Nicole Williams</a
        >
        and is
        <a
          href="https://github.com/cocopuff79/ai_generator_project"
          target="_blank"
          >open-sourced on GitHub</a
        >
        and is
        <a
          href="https://ai-add-on-generator-project.netlify.app/"
          target="_blank"
        >
          hosted on Netlify.</a
        >
      </footer>
    </div>

    <script src="src/script.js"></script>
  </body>
</html>
